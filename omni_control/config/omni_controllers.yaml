controller_manager:
  ros__parameters:
    update_rate: 50

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    omni_controller:
      type: omni_wheel_drive_controller/OmniWheelDriveController

    ur3_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    gripper_controller:
      type: joint_trajectory_controller/JointTrajectoryController

omni_controller:
  ros__parameters:
    wheel_names: [
      "wheel_1_joint",
      "wheel_2_joint",
      "wheel_3_joint",
      "wheel_4_joint"
    ]
    wheel_offset: 0.0
    robot_radius: 0.35
    wheel_radius: 0.1
    publish_rate: 50.0
    odom_frame_id: odom
    base_frame_id: base_footprint
    pose_covariance_diagonal: [0.001, 0.001, 0.0, 0.0, 0.0, 0.01]
    twist_covariance_diagonal: [0.001, 0.0, 0.0, 0.0, 0.0, 0.01]
    open_loop: false
    position_feedback: true
    enable_odom_tf: true
    cmd_vel_timeout: 0.2
    publish_limited_velocity: false 
    linear:
      x:
        has_velocity_limits: true
        has_acceleration_limits: true
        has_jerk_limits: false
        max_velocity: 1.0
        min_velocity: -1.0
        max_acceleration: 3.0
        min_acceleration: -3.0
        max_jerk: 0.0
        min_jerk: 0.0

    angular:
      z:
        has_velocity_limits: true
        has_acceleration_limits: true
        has_jerk_limits: false
        max_velocity: 1.57
        min_velocity: -1.57
        max_acceleration: 1.57
        min_acceleration: -1.57
        max_jerk: 0.0
        min_jerk: 0.0


ur3_controller:
  ros__parameters:
    joints:
      - ur_shoulder_pan_joint
      - ur_shoulder_lift_joint
      - ur_elbow_joint
      - ur_wrist_1_joint
      - ur_wrist_2_joint
      - ur_wrist_3_joint
    
    command_interfaces:
      - position
      - velocity
    
    state_interfaces:
      - position
      - velocity
    
    state_publish_rate: 50.0
    action_monitor_rate: 20.0
    allow_partial_joints_goal: false
    open_loop_control: false
    
    constraints:
      stopped_velocity_tolerance: 0.01
      ur_shoulder_pan_joint:
        trajectory: 0.1
        goal: 0.01
      ur_shoulder_lift_joint:
        trajectory: 0.1
        goal: 0.01
      ur_elbow_joint:
        trajectory: 0.1
        goal: 0.01
      ur_wrist_1_joint:
        trajectory: 0.05
        goal: 0.01
      ur_wrist_2_joint:
        trajectory: 0.05
        goal: 0.01
      ur_wrist_3_joint:
        trajectory: 0.05
        goal: 0.01

gripper_controller:
  ros__parameters:
    joints:
      - gripper_left_finger_joint
      - gripper_right_finger_joint
    
    command_interfaces:
      - position
    
    state_interfaces:
      - position
    
    state_publish_rate: 50.0
    action_monitor_rate: 20.0
    allow_partial_joints_goal: true
    open_loop_control: false
    
    constraints:
      stopped_velocity_tolerance: 0.01
      gripper_left_finger_joint:
        trajectory: 0.01
        goal: 0.005
      gripper_right_finger_joint:
        trajectory: 0.01
        goal: 0.005